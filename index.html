<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔴 Free Live Chaturbate Niches • Top Performers</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #111; color: #fff; font-family: 'Arial', sans-serif; }
.card { transition: transform 0.3s, background 0.3s; }
.card:hover { transform: scale(1.05); background: #1f1f1f; }
iframe { width: 100%; height: 240px; border: none; border-radius: 0.5rem; }
input:focus { outline: none; border-color: #ec4899; }
.tag { display: inline-block; margin-right: 4px; padding: 0 6px; background: #ec4899; color: #fff; border-radius: 4px; font-size: 0.75rem; }
</style>
</head>
<body class="min-h-screen p-6">

<div class="max-w-7xl mx-auto">

  <!-- Header -->
  <header class="text-center mb-8">
    <h1 class="text-5xl font-bold text-pink-500 mb-2">🔴 Live Chaturbate Niches</h1>
    <p class="text-gray-400 text-lg">Browse 2000+ auto-generated niche pages • Updated dynamically</p>
  </header>

  <!-- Search bar -->
  <div class="mb-8 text-center">
    <input id="search" type="text" placeholder="Search niches..." 
           class="w-full md:w-1/2 p-3 rounded-lg bg-zinc-900 text-white border border-zinc-700" 
           oninput="filterNiches()">
  </div>

  <!-- Top performers -->
  <section class="mb-12">
    <h2 class="text-3xl font-bold text-pink-500 mb-4">🔥 Top Performers Live Now</h2>
    <div id="top-performers" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
  </section>

  <!-- Niche grid -->
  <section>
    <h2 class="text-3xl font-bold text-pink-500 mb-4">All Niches</h2>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </section>

</div>

<script>
// ---------------- Niches array ----------------
const niches = [
  {title:"Live BBW Female Cams", slug:"bbw-f"},
  {title:"Live Teen Female Cams", slug:"teen-f"},
  {title:"Live Asian Male Cams", slug:"asian-m"}
];

// ---------------- Render niches ----------------
const grid = document.getElementById("grid");
function renderGrid(items) {
  grid.innerHTML = "";
  items.forEach(n => {
    const card = document.createElement("a");
    card.href = `/niches/${n.slug}/`;
    card.className = "card block p-5 bg-zinc-900 rounded-xl shadow-lg hover:shadow-pink-500/50";
    card.innerHTML = `
      <div class="font-bold text-lg text-pink-400 mb-2">${n.title}</div>
      <div class="text-gray-400 text-sm">Click to explore live rooms</div>
    `;
    grid.appendChild(card);
  });
}
renderGrid(niches);

// ---------------- Search filter ----------------
function filterNiches() {
  const query = document.getElementById("search").value.toLowerCase();
  const filtered = niches.filter(n => n.title.toLowerCase().includes(query));
  renderGrid(filtered);
}

// ---------------- Top performers ----------------
function genderEmoji(gender) {
  switch(gender){
    case "f": return "♀️";
    case "m": return "♂️";
    case "t": return "⚧";
    case "c": return "👥";
    default: return "";
  }
}

function regionFlag(region){
  switch(region){
    case "asia": return "🌏";
    case "europe_russia": return "🌍";
    case "northamerica": return "🇺🇸";
    case "southamerica": return "🇧🇷";
    default: return "";
  }
}

async function loadTopPerformers() {
  const res = await fetch(`https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&format=json&limit=50`);
  const data = await res.json();
  const top = data.results.sort((a,b)=>b.num_users - a.num_users).slice(0,5);
  const container = document.getElementById("top-performers");
  container.innerHTML = "";

  top.forEach(room => {
    const card = document.createElement("div");
    card.className = "bg-zinc-900 rounded-xl p-3 shadow-lg hover:shadow-pink-500/50";

    // Build tags badges
    let tagsHtml = "";
    if(room.tags) room.tags.forEach(t=>{
      tagsHtml += `<span class="tag">${t}</span>`;
    });

    card.innerHTML = `
      <div class="font-bold text-lg text-pink-400 mb-1">${room.username} (${room.num_users} viewers)</div>
      <div class="mb-2 text-gray-300">${genderEmoji(room.gender)} ${regionFlag(room.location)} ${tagsHtml}</div>
      <div>${room.iframe_embed_revshare}</div>
    `;
    container.appendChild(card);
  });
}

loadTopPerformers();
setInterval(loadTopPerformers, 90000);
</script>

</body>
</html>
